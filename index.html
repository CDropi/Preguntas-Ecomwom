<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Recursos/rayo.png">
    <title>Preguntas a la Ponente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="Recursos/Logo3D.png" alt="Logo Ecomwom" class="img-logo">
        <h1><span class="palabra-resaltada">Haz tu</span> pregunta</h1>
        <p>Selecciona a la ponente que está en tarima</p>
    </header>

    <main>
        <div id="contenedor-ponentes" class="grid-ponentes">
            
            <div class="tarjeta-ponente" id="card-Ponente 1">

                <img src="Recursos/Flor.png" alt="Flor 3D" class="decoracion1-3d">
                <img src="Recursos/AnaMaria.png" alt="Foto Ponente 1" class="foto-ponente">
                
                <div class="tarjeta-fondo">
                    <h2>Ana María Botero</h2>
                    <button id="btn-Ponente 1" onclick="abrirFormulario('Ana María')">Preguntar</button>
                </div>
            </div>

            <div class="tarjeta-ponente" id="card-Ponente 2">
                
                <img src="Recursos/Estrella.png" alt="Flor 3D" class="decoracion2-3d">
                <img src="Recursos/2.png" alt="Foto Ponente 2" class="foto-ponente">
                
                <div class="tarjeta-fondo">
                    <h2>Issa Vásquez</h2>
                    <button id="btn-Ponente 2" onclick="abrirFormulario('Issa Vásquez')">Preguntar</button>
                </div>
            </div>

        </div>

        <div id="modal-formulario" style="display: none;">
            <h3 id="titulo-formulario">Pregunta para...</h3>
            <input type="text" id="input-nombre" placeholder="Tu Nombre" required>
            <input type="tel" id="input-telefono" placeholder="Tu Teléfono" required>
            <textarea id="input-pregunta" placeholder="Escribe tu pregunta aquí..." required></textarea>
            <button onclick="enviarDatos()">Enviar Pregunta</button>
            <button onclick="cerrarFormulario()">Cancelar</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
