<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="Recursos/rayo.png">
    <title>Preguntas a la Ponente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <img src="Recursos/Logo3D.png" alt="Logo Ecomwom" class="img-logo">
        <h1><span class="palabra-resaltada">Haz tu</span> pregunta</h1>
    </header>

    <main>
        <div id="contenedor-ponentes" class="grid-ponentes">
            <div class="tarjeta-ponente" id="card-Issa Vásquez">
                
                <img src="Recursos/Estrella.png" alt="Flor 3D" class="decoracion2-3d">
                <img src="Recursos/Issa.png" alt="Foto Issa Vásquez" class="foto-ponente">
                
                <div class="tarjeta-fondo">
                    <h2>Issa Vásquez</h2>
                    <button id="btn-Issa Vásquez" onclick="abrirFormulario('Issa Vásquez')">Preguntar</button>
                </div>
            </div>

        </div>

        <div id="modal-formulario" style="display: none;">
            <img src="Recursos/Flor2.png" alt="Flor2 3D" class="decoracion3-3d">
            <img src="Recursos/Flor3.png" alt="Flor3 3D" class="decoracion4-3d">
            <h3 id="titulo-formulario">Pregunta para...</h3>
            <input type="text" id="input-nombre" placeholder="Tu Nombre" required>
            <input type="tel" id="input-telefono" placeholder="Tu Teléfono" required>
            <textarea id="input-pregunta" placeholder="Escribe tu pregunta aquí..." required></textarea>
            <button class="button_enviar" onclick="enviarDatos()">Enviar Pregunta</button>
            <button class="button_cancelar" onclick="cerrarFormulario()">Cancelar</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
